services:
  db:
    image: postgres:15-alpine
    container_name: quests_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: gerador_quests
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: quests_api
    command: npm run start:dev
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://admin:adminpassword@db:5432/gerador_quests?schema=public"
    restart: unless-stopped

volumes:
  postgres_data: